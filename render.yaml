services:
  - type: web
    name: plan-local
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_DB_URL
        sync: false
      - key: FRONTEND_PATH
        value: templates/pag_principal
