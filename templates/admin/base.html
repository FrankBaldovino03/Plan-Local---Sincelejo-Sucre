<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} · Plan Local</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('admin.admin_css', filename='style.css') }}">
</head>
<body>
    <header class="admin-header">
        <div>
            <span class="logo">Plan Local</span>
            <span class="admin-badge">Admin</span>
        </div>
        <nav class="admin-nav">
            <form method="post" action="{{ url_for('admin.index') }}" class="admin-nav-form">
                <button type="submit" class="nav-tab{% if admin_tab|default('') == 'list' %} activo{% endif %}">Listado</button>
            </form>
            <form method="post" action="{{ url_for('admin.nuevo') }}" class="admin-nav-form">
                <input type="hidden" name="_formulario" value="1">
                <button type="submit" class="nav-tab{% if admin_tab|default('') == 'nuevo' %} activo{% endif %}">Nuevo sitio</button>
            </form>
        </nav>
    </header>
    <div class="wrap">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="flash {{ category or 'success' }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
